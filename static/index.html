<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Claude Streaming Starter</title>
  <style>
    :root { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; color-scheme: light dark; }
    body { max-width: 720px; margin: 2em auto; padding: 0 1em; line-height: 1.5; }
    h1 { margin-bottom: 0.2em; }
    .sub { color: #666; margin-top: 0; font-size: 0.95em; }
    .row { display: flex; gap: 0.5em; margin: 1em 0; }
    input { flex: 1; padding: 0.6em; font-size: 1em; border: 1px solid #ccc; border-radius: 6px; }
    button { padding: 0.6em 1.2em; font-size: 1em; border: 0; border-radius: 6px; background: #2563eb; color: white; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #out { white-space: pre-wrap; background: #f5f5f5; padding: 1em; border-radius: 8px; min-height: 5em; word-wrap: break-word; }
    #cost { font-size: 0.85em; color: #666; margin-top: 0.8em; font-family: ui-monospace, "SF Mono", Menlo, monospace; }
    @media (prefers-color-scheme: dark) {
      body { background: #1a1a1a; color: #eee; }
      #out { background: #2a2a2a; }
      input { background: #2a2a2a; color: #eee; border-color: #444; }
    }
  </style>
</head>
<body>
  <h1>Claude Streaming Starter</h1>
  <p class="sub">FastAPI + Anthropic SDK + Server-Sent Events. Open the browser console to watch SSE events.</p>

  <div class="row">
    <input id="msg" placeholder="Ask anything (e.g. 'Explain async/await in one sentence')" autocomplete="off" autofocus>
    <button id="go">Send</button>
  </div>

  <h3>Response</h3>
  <div id="out"></div>
  <div id="cost"></div>

  <script>
    let currentSource = null;
    const out = document.getElementById("out");
    const cost = document.getElementById("cost");
    const msgInput = document.getElementById("msg");
    const goBtn = document.getElementById("go");

    goBtn.addEventListener("click", send);
    msgInput.addEventListener("keydown", e => { if (e.key === "Enter") send(); });

    function send() {
      const msg = msgInput.value.trim();
      if (!msg) return;
      if (currentSource) currentSource.close();
      out.textContent = "";
      cost.textContent = "(streaming...)";
      goBtn.disabled = true;

      currentSource = new EventSource("/chat?msg=" + encodeURIComponent(msg));
      currentSource.onmessage = e => {
        const ev = JSON.parse(e.data);
        if (ev.type === "delta") {
          out.textContent += ev.text;
        } else if (ev.type === "done") {
          const c = ev.cost;
          cost.textContent = `Model: ${c.model}  |  in: ${c.uncached_input_tokens} (+${c.cache_read_tokens} cached read, +${c.cache_write_tokens} cache write)  |  out: ${c.output_tokens}  |  $${c.cost_usd}`;
          currentSource.close();
          goBtn.disabled = false;
        } else if (ev.type === "error") {
          out.textContent += `\n[Error: ${ev.message}]`;
          cost.textContent = "";
          currentSource.close();
          goBtn.disabled = false;
        }
      };
      currentSource.onerror = () => {
        cost.textContent = cost.textContent || "(connection error)";
        currentSource.close();
        goBtn.disabled = false;
      };
    }
  </script>
</body>
</html>
